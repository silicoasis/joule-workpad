<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkPad</title>
  <link rel="stylesheet" href="styles.css?v=2" />
  <script type="module" src="../library/joule/index.js?v=4"></script>
</head>
<body>

  <div class="panel-wrapper">
    <joule-panel
      background="/library/joule/assets/35389364ed5382f2923bdedaa0c96a0ce997bed2.svg">

      <!-- header slot — 3013:83762 -->
      <joule-header slot="header" title="Conversation Title"></joule-header>

      <!-- content slot — 3013:83766 -->
      <!-- welcome screen shown by default; swapped for canvas on first message -->
      <!-- joule-message-input is slotted into welcome's input slot so it sits
           between the headline and the suggestion chips -->
      <joule-welcome slot="content" id="welcome">
        <joule-message-input
          slot="input"
          id="input"
          placeholder="Create with Joule"
          mention="Space">
        </joule-message-input>
      </joule-welcome>
      <joule-conversation-canvas slot="content" id="canvas" style="display:none"></joule-conversation-canvas>

      <!-- disclaimer slot — 3013:83768 -->
      <joule-disclaimer slot="disclaimer"></joule-disclaimer>

    </joule-panel>
  </div>

  <script type="module">
    /* ── Invisible corner-drag resize ─────────────────────────────────────────
       Four transparent 24×24 handles are placed at each corner of .panel-wrapper.
       Dragging any corner resizes width/height; the panel stays centred via body flexbox.
       No native resize indicator is shown — the handles are completely invisible.
    ── */
    (function () {
      const wrapper = document.querySelector('.panel-wrapper');
      const MIN_W = 320, MIN_H = 480;

      // cx/cy: +1 = drag toward ↓→ grows, -1 = drag toward ↑← grows
      const CORNERS = [
        { t: 0,    l: 0,    cx: -1, cy: -1, cur: 'nw-resize' },
        { t: 0,    r: 0,    cx:  1, cy: -1, cur: 'ne-resize' },
        { b: 0,    l: 0,    cx: -1, cy:  1, cur: 'sw-resize' },
        { b: 0,    r: 0,    cx:  1, cy:  1, cur: 'se-resize' },
      ];

      CORNERS.forEach(({ t, l, r, b, cx, cy, cur }) => {
        const el = document.createElement('div');
        const pos = [
          t != null ? `top:${t}px`    : null,
          l != null ? `left:${l}px`   : null,
          r != null ? `right:${r}px`  : null,
          b != null ? `bottom:${b}px` : null,
        ].filter(Boolean).join(';');
        el.style.cssText =
          `position:absolute;${pos};width:24px;height:24px;` +
          `cursor:${cur};z-index:9999;background:transparent;`;
        wrapper.appendChild(el);

        el.addEventListener('mousedown', (e) => {
          e.preventDefault();
          const sx = e.clientX, sy = e.clientY;
          const sw = wrapper.offsetWidth, sh = wrapper.offsetHeight;
          const maxW = window.innerWidth  - 48;
          const maxH = window.innerHeight - 48;

          const onMove = (e2) => {
            const w = Math.max(MIN_W, Math.min(maxW, sw + (e2.clientX - sx) * cx));
            const h = Math.max(MIN_H, Math.min(maxH, sh + (e2.clientY - sy) * cy));
            wrapper.style.width  = w + 'px';
            wrapper.style.height = h + 'px';
          };
          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup',   onUp);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup',   onUp);
        });
      });
    })();

    /* ── Drag by header ────────────────────────────────────────────────────
       Mousedown on joule-header starts a drag. On first drag the wrapper is
       switched from flex-centered to position:fixed at its current screen
       coordinates so it can be moved freely. Corner-resize still works after.
    ── */
    (function () {
      const wrapper = document.querySelector('.panel-wrapper');
      const header  = document.querySelector('joule-header');
      if (!wrapper || !header) return;

      header.style.cursor = 'grab';

      header.addEventListener('mousedown', (e) => {
        /* Skip if the user clicked an interactive element inside the shadow */
        const interactive = e.composedPath().some(el =>
          el instanceof Element &&
          (el.tagName === 'BUTTON' || el.tagName === 'A' || el.tagName === 'INPUT' ||
           el.getAttribute?.('role') === 'button')
        );
        if (interactive) return;

        e.preventDefault();

        /* First drag: freeze position at current screen location */
        if (wrapper.style.position !== 'fixed') {
          const r = wrapper.getBoundingClientRect();
          wrapper.style.position = 'fixed';
          wrapper.style.left     = r.left + 'px';
          wrapper.style.top      = r.top  + 'px';
          wrapper.style.margin   = '0';
          /* Neutralise body flex-centering so it no longer repositions the wrapper */
          document.body.style.alignItems     = 'flex-start';
          document.body.style.justifyContent = 'flex-start';
        }

        header.style.cursor = 'grabbing';
        const sx = e.clientX, sy = e.clientY;
        const sl = parseFloat(wrapper.style.left) || 0;
        const st = parseFloat(wrapper.style.top)  || 0;

        const onMove = (ev) => {
          wrapper.style.left = (sl + ev.clientX - sx) + 'px';
          wrapper.style.top  = (st + ev.clientY - sy) + 'px';
        };
        const onUp = () => {
          header.style.cursor = 'grab';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup',   onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup',   onUp);
      });
    })();

    /* ── HAI Proxy (Anthropic/Claude via CORS relay → localhost:6655) ──────
       Browser calls CORS relay at :6656 (hai-relay.js) which forwards to
       the HAI proxy at :6655/anthropic/v1/messages.
       Run:  node jtest/hai-relay.js   (before starting the app)
       Falls back to mock responses when relay/proxy is unavailable.        */
    const HAI = {
      url:       'http://localhost:6656',      // CORS relay (hai-relay.js)
      agentUrl:  'http://localhost:6657/agent', // web-agent.js (DuckDuckGo + HAI)
      apiKey:    '14615e0f-2fcb-4bb1-8b0a-4fd166743715',
      model:     'anthropic--claude-4.5-haiku',
    };

    /**
     * Call the HAI proxy directly (no web search).
     * Throws if the proxy is unreachable or returns an error.
     */
    async function callHAI(userText) {
      const res = await fetch(HAI.url, {
        method: 'POST',
        headers: {
          'x-api-key':         HAI.apiKey,
          'Content-Type':      'application/json',
          'anthropic-version': '2023-06-01',
        },
        body: JSON.stringify({
          model:      HAI.model,
          max_tokens: 1024,
          system: 'You are Joule, SAP\'s AI assistant. Be helpful, concise, and professional. ' +
                  'Use markdown formatting where appropriate: headings, bold, lists, code blocks, tables. ' +
                  'MATH FORMATTING: For ALL mathematical expressions, formulas, and equations, always use ' +
                  'LaTeX notation — $$...$$ for display/block equations (on their own line) and $...$ for ' +
                  'inline math within text. Use proper LaTeX commands such as \\frac, \\sum, \\int, \\partial, ' +
                  '\\nabla, \\sqrt, \\vec, \\hat, \\cdot, \\times, \\mu, \\nu, \\alpha, \\beta, \\gamma, ' +
                  '\\hbar, \\mathbf, \\mathrm, etc. NEVER write equations as plain text.',
          messages: [{ role: 'user', content: userText }],
        }),
        signal: AbortSignal.timeout(20000),
      });
      if (!res.ok) throw new Error(`HAI proxy ${res.status}`);
      const data = await res.json();
      const text = data?.content?.[0]?.text ?? '';
      if (!text) throw new Error('empty response');
      return text;
    }

    /**
     * Call the web agent (DuckDuckGo search → HAI with enriched context).
     * Falls back to callHAI() if the agent is unavailable.
     */
    async function callAgent(userText) {
      const res = await fetch(HAI.agentUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userText, apiKey: HAI.apiKey, model: HAI.model }),
        signal: AbortSignal.timeout(35000), // agent needs more time (search + LLM)
      });
      if (!res.ok) throw new Error(`agent ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const text = data?.text ?? '';
      if (!text) throw new Error('empty agent response');
      console.log(`[agent] searched=${data.searched}`);
      return text;
    }

    /* Wait for custom elements to be defined before wiring events */
    await Promise.all([
      customElements.whenDefined('joule-panel'),
      customElements.whenDefined('joule-conversation-canvas'),
      customElements.whenDefined('joule-message-input'),
      customElements.whenDefined('joule-welcome'),
    ]);

    const canvas  = document.getElementById('canvas');
    const welcome = document.getElementById('welcome');
    const input   = document.getElementById('input');

    /** Switch from welcome screen to conversation canvas (once). */
    function showCanvas() {
      if (welcome.style.display !== 'none') {
        welcome.style.display = 'none';
        canvas.style.display  = '';
      }
    }

    /* joule-suggest — chip click: populate input and send */
    welcome.addEventListener('joule-suggest', (e) => {
      const { category } = e.detail;
      /* Programmatically set the input text and fire a send */
      const ed = input.shadowRoot?.querySelector('.mi-editor');
      if (ed) {
        input.expand();                       // ensure expanded
        requestAnimationFrame(() => {
          const editor = input.shadowRoot?.querySelector('.mi-editor');
          if (editor) {
            editor.textContent = category;
            editor.dispatchEvent(new InputEvent('input', { bubbles: true }));
            requestAnimationFrame(() => input.shadowRoot?.querySelector('[data-act="send"]')?.click());
          }
        });
      }
    });

    /* Mock fallback lines for plain-text responses */
    const MOCK_TEXT_LINES = [
      'Your current salary band is Grade 5, Band B, as defined in your employment contract dated January 2024, and is determined by your job grade and location cluster assignment.',
      'The standard compensation range for this band is $72,000 to $88,000 per year, and your current base salary of $74,500 falls within that range.',
      'The discrepancy you noticed on your latest paycheck is most likely related to the mid-year federal tax withholding adjustment that was applied in August, as well as the updated pension contribution rate that took effect on February 1st of this year.',
      'Both changes were communicated in the HR bulletin issued in January.',
      'I recommend reviewing the detailed payslip breakdown available in the SAP SuccessFactors self-service portal, where each deduction line is itemized clearly.',
      'If after reviewing those details the figures still do not match your expectations, please raise a support ticket with HR Services and reference your employee ID for expedited processing — they typically resolve these within 2 business days.',
    ];

    /* joule-send — keyword routing:
       "table"  → table response  (always mock)
       "code"   → code response   (always mock)
       anything → HAI proxy first, mock fallback                            */
    input.addEventListener('joule-send', async (e) => {
      const { text, mention } = e.detail;
      showCanvas();   /* hide welcome, reveal canvas */
      canvas.addUserMessage(text, mention);
      canvas.showLoading('Connecting to Performance Assistant ...');

      const kw = text.trim().toLowerCase();

      if (kw === 'table') {
        await new Promise(r => setTimeout(r, 1200));
        await canvas.streamTableResponse();

      } else if (kw === 'code') {
        await new Promise(r => setTimeout(r, 1200));
        await canvas.streamCodeResponse();

      } else {
        /* Try web agent first (DuckDuckGo + HAI), fall back to direct HAI, then mock */
        try {
          const raw = await callAgent(text);
          await canvas.streamMarkdown(raw);
        } catch (agentErr) {
          console.warn('[agent] unavailable, trying HAI direct:', agentErr.message);
          try {
            const raw = await callHAI(text);
            await canvas.streamMarkdown(raw);
          } catch (haiErr) {
            console.warn('[HAI] proxy unavailable, using mock:', haiErr.message);
            await new Promise(r => setTimeout(r, 1200));
            await canvas.streamMarkdown(MOCK_TEXT_LINES.join('\n\n'));
          }
        }
      }
    });
  </script>

</body>
</html>
